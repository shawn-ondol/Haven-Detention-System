document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element вҖ” warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags вҖ” manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs вҖ”
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin вҖ” blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec вҖ” re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"ko\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Haven MD v2 вҖ” Morning Detention System<\u002Ftitle>\n\n<style>\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   RESET & BASE\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n*{box-sizing:border-box;margin:0;padding:0;}\n:root{\n  --bg:#F7F4EF;\n  --surf:#FFFFFF;\n  --nav:#2C2B27;\n  --b1:rgba(60,56,45,.12);\n  --b2:rgba(60,56,45,.22);\n  --t1:#1E1D1A;\n  --t2:#6B6660;\n  --t3:#A09A93;\n  --ac:#7C4D1E;\n  --acl:#F5E9DC;\n  --acm:#C47A3A;\n  --acd:#5A3512;\n  --gr:#3B6D11;\n  --grl:#EAF3DE;\n  --rd:#A32D2D;\n  --rdl:#FCEBEB;\n  --bl:#185FA5;\n  --bll:#E6F1FB;\n  --warn-bg:#FAEEDA;\n  --warn-c:#633806;\n  --warn-b:#FAC775;\n  --font:'Segoe UI',system-ui,-apple-system,sans-serif;\n}\nbody{font-family:var(--font);background:var(--bg);color:var(--t1);font-size:14px;min-height:100vh;}\ninput,select,textarea,button{font-family:inherit;}\ninput[type=text],input[type=password],input[type=date],select,textarea{\n  padding:6px 9px;border:0.5px solid var(--b2);border-radius:6px;\n  background:transparent;color:var(--t1);font-size:13px;width:100%;\n}\ninput[type=text],input[type=password],input[type=date],select{height:32px;}\ntextarea{resize:vertical;min-height:64px;}\ninput:focus,select:focus,textarea:focus{outline:2px solid var(--acm);outline-offset:1px;}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   LAYOUT\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.shell{display:flex;flex-direction:column;min-height:100vh;}\n.navbar{background:var(--nav);display:flex;align-items:center •җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   BUTTONS\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;font-size:12.5px;border-radius:6px;border:0.5px solid var(--b2);background:transparent;cursor:pointer;color:var(--t2);white-space:nowrap;transition:background .12s;}\n.btn:hover{background:var(--bg);}\n.btn-p{background:var(--ac);color:#fff;border-color:var(--ac);}.btn-p:hover{background:var(--acd);}\n.btn-danger{background:var(--rdl);color:var(--rd);border-color:#F7C1C1;}.btn-danger:hover{background:#F5D0D0;}\n.btn-warn{background:var(--warn-bg);color:var(--warn-c);border-color:var(--warn-b);}\n.btn-sm{padding:3px 9px;font-size:11px;border-radius:5px;border:0.5px solid var(--b2);background:transparent;cursor:pointer;color:var(--t2);white-space:nowrap;}\n.btn-edit{border-color:var(--bll);color:var(--bl);background:var(--bll);}.btn-edit:hover{background:#CCE3F7;}\n.btn-del{border-color:#F7C1C1;color:var(--rd);background:var(--rdl);}.btn-del:hover{background:#F5D0D0;}\n.btn-skip{border-color:var(--warn-b);color:var(--warn-c);background:var(--warn-bg);}\n.btn-exc{border-color:#B5D4F4;color:var(--bl);background:var(--bll);}\n.btn-mark{padding:5px 13px;font-size:12px;border-radius:6px;border:0.5px solid #A8D880;background:var(--grl);color:var(--gr);cursor:pointer;}\n.btn-mark:hover{background:#D4ECC0;}\n.btn-nav{padding:5px 11px;font-size:14px;border-radius:6px;border:0.5px solid var(--b2);background:transparent;cursor:pointer;color:var(--t2);}\n.btn-nav:hover{background:var(--bg);}\n.btn-nav:disabled{opacity:.3;cursor:default;}\n.role-btn{padding:4px 12px;font-size:11px;border-radius:20px;border:0.5px solid rgba(255,255,255,.2);background:transparent;cursor:pointer;color:rgba(240,237,232,.55);}\n.role-btn.on{background:var(--acm);color:#fff;border-color:var(--acm);}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   FORM ELEMENTS\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:11px;}\n.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}\n.grid-21{display:grid;grid-template-columns:2fr 1fr;gap:11px;margin-bottom:11px;}\n.grid-312{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:11px;margin-bottom:11px;}\n.field label{display:block;font-size:11px;color:var(--t2);margin-bottom:4px;letter-spacing:.02em;}\n.sec-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px;}\n.cb-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 10px;margin-top:4px;}\n.cb-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border:0.5px solid var(--b1);border-radius:6px;cursor:pointer;transition:background .1s;}\n.cb-item:hover{background:var(--bg);}\n.cb-item.on{background:var(--bll);border-color:#B5D4F4;}\n.cb-item input{width:14px;height:14px;accent-color:var(--bl);cursor:pointer;}\n.cb-item span{font-size:13px;color:var(--t1);}\n.cb-item.on span{color:var(--bl);}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   CARDS & TABLES\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.card{background:var(--surf);border:0.5px solid var(--b1);border-radius:10px;overflow:hidden;margin-bottom:13px;}\n.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:0.5px solid var(--b1);}\n.card-title{font-size:12.5px;font-weight:600;color:var(--t1);}\n.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}\n.stat-card{background:var(--surf);border:0.5px solid var(--b1);border-radius:8px;padding:11px 13px;display:flex;align-items:center;gap:10px;}\n.stat-ico{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;}\n.stat-val{font-size:21px;font-weight:600;line-height:1;color:var(--t1);}\n.stat-lbl{font-size:11px;color:var(--t2);margin-top:2px;}\n.tbl-wrap{overflow-x:auto;}\ntable{width:100%;border-collapse:collapse;font-size:12.5px;}\nth{background:#F2EDE5;padding:7px 8px;text-align:left;font-size:10.5px;font-weight:700;color:#7A7268;border-bottom:0.5px solid var(--b2);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;}\nth .th-ko{display:block;font-size:9.5px;font-weight:500;color:var(--t3);text-transform:none;letter-spacing:0;margin-top:1px;}\nth.tc{text-align:center;}\ntd{padding:7px 8px;border-bottom:0.5px solid var(--b1);color:var(--t1);vertical-align:middle;}\n#st-tbl th:first-child,#st-tbl td:first-child{position:sticky;left:0;z-index:2;background:var(--surf);}\n#st-tbl tr>th:nth-child(2),#st-tbl tbody td:nth-child(2){position:sticky;left:96px;z-index:2;background:var(--surf);border-right:0.5px solid var(--b1);}\n#st-tbl th:first-child{width:96px;min-width:96px;max-width:96px;}\n#st-tbl thead tr:first-child th:first-child,#st-tbl thead tr:first-child th:nth-child(2){background:#F2EDE5;vertical-align:middle;}\n#st-tbl th,#st-tbl td{padding:5px 6px;}\n#st-tbl td:first-child{overflow:hidden;text-overflow:ellipsis;}\ntd.tc{text-align:center;}\ntr:last-child td{border-bottom:none;}\ntr.hover-row:hover td{background:var(--bg);}\ntr.dim td{opacity:.45;}\ntr.row-sk td{background:var(--bg);color:var(--t3);}\ntr.row-ex td{background:#E6F1FB33;}\n.name-link{color:var(--bl);cursor:pointer;font-weight:600;}\n.name-link:hover{text-decoration:underline;}\n.empty-msg{text-align:center;padding:36px;color:var(--t3);font-size:13px;}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   PILLS & BADGES\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.pill{display:inline-flex;align-items:center;font-size:10.5px;padding:2.5px 9px;border-radius:20px;white-space:nowrap;font-weight:500;}\n.p-ac{background:var(--acl);color:var(--acd);}\n.p-gr{background:var(--grl);color:var(--gr);}\n.p-rd{background:var(--rdl);color:var(--rd);}\n.p-bl{background:var(--bll);color:var(--bl);}\n.p-gy{background:var(--bg);color:var(--t2);border:0.5px solid var(--b2);}\n.p-sk{background:var(--warn-bg);color:var(--warn-c);}\n.p-done{background:var(--grl);color:var(--gr);}\n.cb2{display:inline-block;min-width:26px;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600;text-align:center;}\n.c-n{background:var(--bg);color:var(--t2);}\n.c-5{background:var(--warn-bg);color:var(--warn-c);border:0.5px solid var(--warn-b);}\n.c-10{background:#FAECE7;color:#4A1B0C;border:0.5px solid #EFB49E;}\n.c-15{background:var(--rd);color:#fff;font-weight:700;}\n.ab{display:inline-block;font-size:10.5px;padding:3px 9px;border-radius:20px;border:0.5px solid;white-space:nowrap;font-weight:500;}\n.ab-n{background:var(--bg);color:var(--t3);border-color:var(--b2);font-style:italic;}\n.ab-w{background:var(--warn-bg);color:var(--warn-c);border-color:var(--warn-b);}\n.ab-c{background:var(--rdl);color:var(--rd);border-color:#F7C1C1;}\n.ab-done{background:var(--grl);color:var(--gr);border-color:#A8D880;}\n.auto-tag{font-size:10px;color:var(--t3);font-style:italic;}\n.badge-sk{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;background:var(--warn-bg);color:var(--warn-c);border:0.5px solid var(--warn-b);}\n.badge-ex{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bll);color:var(--bl);border:0.5px solid #B5D4F4;}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   MARKS (period grid)\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.mark{position:relative;display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;font-size:9.5px;font-weight:600;cursor:default;}\n.mk-p{background:var(--bll);color:var(--bl);}\n.mk-hr{background:var(--warn-bg);color:var(--warn-c);}\n.mk-etc{background:var(--bg);color:var(--t3);}\n.mk-sk{background:var(--warn-bg);color:var(--warn-c);}\n.mark .tip{display:none;position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:10px;padding:4px 8px;border-radius:5px;white-space:nowrap;z-index:200;pointer-events:none;}\n.mark:hover .tip{display:block;}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   TABLE NAV\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.tbl-ctrl{display:flex;align-items:center;gap:8px;margin-bottom:9px;padding:7px 12px;background:var(--surf);border-radius:9px;border:0.5px solid var(--b2);box-shadow:0 1px 2px rgba(60,56,45,.05);}\n.tbl-ctrl-lbl{font-size:11px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}\n.tbl-ctrl-pg{font-size:11px;color:var(--t3);white-space:nowrap;}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   CALENDAR\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.cal-wrap{background:var(--surf);border:0.5px solid var(--b1);border-radius:10px;padding:18px;margin-bottom:13px;}\n.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}\n.cal-nav-btn{background:none;border:0.5px solid var(--b2);border-radius:7px;cursor:pointer;padding:4px 13px;font-size:14px;color:var(--t2);}\n.cal-nav-btn:hover{background:var(--bg);}\n.cal-month{font-size:15.5px;font-weight:600;color:var(--t1);letter-spacing:.01em;}\n.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}\n.cal-dow{text-align:center;font-size:10.5px;padding:5px 0;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;}\n.cal-dow.we{color:var(--rd);}\n.cd{text-align:center;padding:7px 3px 5px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;user-select:none;min-height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:border-color .1s;}\n.cd.empty{cursor:default;}.cd.nd{background:var(--bg);}\n.cd.ir{background:var(--bll);}.cd.ir .dn{color:var(--bl);}\n.cd.we-day .dn{color:var(--rd);}\n.cd.nh .dn{color:var(--rd)!important;}\n.cd.sh{background:var(--rdl)!important;}.cd.sh .dn{color:var(--rd);}\n.cd.today{box-shadow:inset 0 0 0 1.5px var(--acm);}\n.cd.today .dn{font-weight:700;color:var(--acd);}\n.cd:hover:not(.empty):not(.nd){border-color:var(--b2);}\n.dn{display:block;font-size:12.5px;line-height:1.2;}\n.dl{display:block;font-size:9px;color:var(--rd);line-height:1.1;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}\n.hol-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}\n.hol-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--rdl);color:var(--rd);border:0.5px solid #F7C1C1;}\n.hol-chip button{background:none;border:none;cursor:pointer;color:var(--rd);font-size:13px;line-height:1;padding:0;}\n.cal-legend{display:flex;gap:14px;font-size:11px;color:var(--t3);margin-top:12px;flex-wrap:wrap;align-items:center;}\n.lsw{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:middle;margin-right:4px;}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   FILTER BAR\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.fbar{display:flex;align-items:center;gap:8px;margin-bottom:11px;flex-wrap:wrap;background:var(--surf);border:0.5px solid var(--b1);border-radius:9px;padding:8px 12px;}\n.fbar label{font-size:12px;color:var(--t2);}\n.fbar input[type=date]{width:auto;height:30px;}\n.fcnt{font-size:11px;color:var(--t3);}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   MILESTONE PIPS\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.mpb{display:flex;align-items:center;gap:2.5px;justify-content:center;}\n.mp{width:7.5px;height:7.5px;border-radius:50%;background:var(--b2);}\n.mp.w{background:var(--acm);}.mp.a{background:#993C1D;}.mp.c{background:var(--rd);}\n.msep{width:1px;height:9px;background:var(--b2);margin:0 2px;}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   MODALS\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}\n.overlay.open{display:flex;}\n.modal{background:var(--surf);border-radius:10px;padding:20px;width:540px;max-width:95vw;max-height:88vh;overflow-y:auto;border:0.5px solid var(--b2);box-shadow:0 8px 32px rgba(0,0,0,.18);}\n.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}\n.modal-title{font-size:15px;font-weight:600;color:var(--t1);}\n.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--t3);line-height:1;}\n.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:0.5px solid var(--b1);}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   MISC\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n.info{background:var(--bll);border:0.5px solid #B5D4F4;border-radius:7px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--bl);}\n.warn-box{background:var(--warn-bg);border:0.5px solid var(--warn-b);border-radius:7px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--warn-c);}\n.lock-box{background:var(--bg);border:0.5px solid var(--b2);border-radius:7px;padding:14px;text-align:center;color:var(--t3);font-size:13px;}\n.rec-chip{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;border:0.5px solid var(--b1);border-radius:7px;margin-bottom:6px;font-size:12.5px;background:var(--surf);}\n.archive-card{background:var(--bg);border-radius:7px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;border:0.5px solid var(--b1);}\n.tab-row{display:flex;border-bottom:0.5px solid var(--b1);margin-bottom:13px;}\n.tab-btn{padding:7px 15px;font-size:12.5px;cursor:pointer;background:none;border:none;color:var(--t3);border-bottom:2.5px solid transparent;margin-bottom:-.5px;transition:color .1s;}\n.tab-btn.on{color:var(--bl);border-bottom-color:var(--bl);font-weight:600;}\n.tp{display:none;}.tp.on{display:block;}\n.hist-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--b1);}\n.hist-row:last-child{border-bottom:none;}\n.hist-dot{width:8px;height:8px;border-radius:50%;background:var(--bl);flex-shrink:0;margin-top:5px;}\n.hist-dot.auto{background:var(--acm);}\n.action-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}\n/* в•җв•җв•җ DETENTION SLIP в•җв•җв•җ */\n.slip{background:#fff;border:2px solid #141414;border-radius:4px;max-width:780px;margin:0 auto 14px;overflow:visible;}\n.slip-hdr{display:flex;align-items:stretch;border-bottom:2px solid #141414;border-radius:2px 2px 0 0;overflow:hidden;}\n.slip-title{background:#E32219;color:#F7D31E;font-weight:800;font-size:21px;letter-spacing:.05em;padding:10px 18px;flex:1;font-style:italic;}\n.slip-date{display:flex;align-items:center;gap:6px;padding:0 14px;border-left:2px solid #141414;font-size:11px;font-weight:700;letter-spacing:.04em;}\n.slip-date input{border:none;width:auto;height:30px;font-size:13px;padding:0 4px;}\n.slip-body{display:grid;grid-template-columns:80px 1.2fr 104px 1.5fr;}\n.sl-lbl{grid-column:1;display:block;align-content:center;padding:14px 10px;font-size:11px;font-weight:800;letter-spacing:.05em;}\n.sl-ko{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.02em;}\n.sl-in{grid-column:2;display:flex;align-items:center;border-left:1.5px solid #141414;padding:4px 6px;}\n.sl-in input,.sl-in select{border:none;font-size:14px;height:36px;}\n.sl-bt{border-top:1.5px solid #141414;}\n.sl-rsn-lbl{grid-column:3;grid-row:1/4;display:block;align-content:center;text-align:center;background:#EFECE6;border-left:1.5px solid #141414;font-size:10.5px;font-weight:800;letter-spacing:.04em;line-height:1.6;padding:8px;}\n.sl-rsn{grid-column:4;grid-row:1/4;display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;align-content:center;padding:12px 14px;border-left:1.5px solid #141414;}\n.sl-rsn label{display:flex;gap:7px;align-items:center;font-size:11.5px;font-weight:700;letter-spacing:.02em;cursor:pointer;white-space:nowrap;}\n.sl-rsn input{width:13px;height:13px;accent-color:#141414;cursor:pointer;}\n.sl-rsn label.on{color:#E32219;}\n\n/* в•җв•җв•җ CAL LIST ROWS в•җв•җв•җ */\n.cal-li{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12px;padding:4px 0;border-bottom:0.5px dotted var(--b1);}\n.cal-li:last-child{border-bottom:none;}\n.cal-li .x{border:none;background:none;color:var(--t3);cursor:pointer;font-size:13px;padding:0 3px;}\n.cal-li .x:hover{color:var(--rd);}\n.cal-li-empty{font-size:11px;color:var(--t3);}\n\n/* в•җв•җв•җ NAME TYPEAHEAD в•җв•җв•җ */\n.nm-dd{display:none;position:absolute;top:100%;left:0;right:0;background:var(--surf);border:0.5px solid var(--b2);border-radius:0 0 8px 8px;box-shadow:0 8px 22px rgba(0,0,0,.14);max-height:300px;overflow-y:auto;z-index:60;}\n.nm-dd-item{padding:8px 13px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;gap:10px;align-items:center;}\n.nm-dd-item:hover{background:var(--bg);}\n.nm-dd-item .nm-meta{font-size:11px;color:var(--t3);white-space:nowrap;}\n.nm-dd-none{padding:9px 13px;font-size:12px;color:var(--t3);}\n\n/* в•җв•җв•җ AUTH в•җв•җв•җ */\n.auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px;}\n.auth-card{background:var(--surf);border:0.5px solid var(--b1);border-radius:14px;box-shadow:0 8px 40px rgba(60,56,45,.10);width:400px;max-width:100%;padding:34px 34px 26px;}\n.auth-logo{width:52px;height:52px;border-radius:13px;background:var(--acm);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;}\n.auth-title{text-align:center;font-size:21px;font-weight:700;color:var(--t1);letter-spacing:.01em;}\n.auth-sub{text-align:center;font-size:12px;color:var(--t3);margin:5px 0 20px;}\n.auth-tabs{display:flex;border:0.5px solid var(--b2);border-radius:8px;overflow:hidden;margin-bottom:18px;}\n.auth-tabs button{flex:1;padding:8px 0;font-size:12.5px;border:none;background:transparent;color:var(--t2);cursor:pointer;}\n.auth-tabs button.on{background:var(--ac);color:#fff;font-weight:600;}\n.auth .field{margin-bottom:11px;}\n.auth-err{display:none;background:var(--rdl);color:var(--rd);border:0.5px solid #F7C1C1;border-radius:7px;padding:7px 11px;font-size:12px;margin-bottom:11px;}\n.auth-id-preview{background:var(--bg);border:0.5px dashed var(--b2);border-radius:7px;padding:8px 11px;font-size:12.5px;color:var(--t2);margin-bottom:11px;}\n.auth-id-preview strong{color:var(--ac);letter-spacing:.02em;}\n.auth-btn{width:100%;padding:10px 0;border:none;border-radius:8px;background:var(--ac);color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:4px;}\n.auth-btn:hover{background:var(--acd);}\n.auth-foot{text-align:center;font-size:11px;color:var(--t3);margin-top:16px;line-height:1.6;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- в•җв•җв•җв•җ AUTH SCREEN в•җв•җв•җв•җ -->\n<div class=\"auth\" id=\"auth\">\n  <div class=\"auth-card\">\n    <div class=\"auth-logo\">рҹӣЎ<\u002Fdiv>\n    <h1 class=\"auth-title\">Haven MH Detention System<\u002Fh1>\n    <div class=\"auth-sub\">мӨ‘кі л“ұ л””н…җм…ҳ кҙҖлҰ¬ мӢңмҠӨн…ң<\u002Fdiv>\n    <div class=\"auth-tabs\">\n      <button id=\"at-login\" class=\"on\" onclick=\"authTab('login')\">Login В· лЎңк·ёмқё<\u002Fbutton>\n      <button id=\"at-signup\" onclick=\"authTab('signup')\">Sign up В· нҡҢмӣҗк°Җмһ…<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"auth-pane-login\">\n      <div class=\"auth-err\" id=\"login-err\"><\u002Fdiv>\n      <div class=\"field\"><label>ID В· м•„мқҙл””<\u002Flabel><input type=\"text\" id=\"l-id\" placeholder=\"e.g. firstname+lastname\"><\u002Fdiv>\n      <div class=\"field\"><label>Password В· л№„л°ҖлІҲнҳё<\u002Flabel><input type=\"password\" id=\"l-pw\" onkeydown=\"if(event.key==='Enter')doLogin()\"><\u002Fdiv>\n      <button class=\"auth-btn\" onclick=\"doLogin()\">Login В· лЎңк·ёмқё<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"auth-pane-signup\" style=\"display:none\">\n      <div class=\"auth-err\" id=\"su-err\"><\u002Fdiv>\n      <div class=\"grid2\" style=\"margin-bottom:0\">\n        <div class=\"field\"><label>First name В· мқҙлҰ„<\u002Flabel><input type=\"text\" id=\"su-fn\"><\u002Fdiv>\n        <div class=\"field\"><label>Last name В· м„ұ<\u002Flabel><input type=\"text\" id=\"su-ln\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"field\"><label>Password В· л№„л°ҖлІҲнҳё<\u002Flabel><input type=\"password\" id=\"su-pw\" onkeydown=\"if(event.key==='Enter')doSignup()\"><\u002Fdiv>\n      <button class=\"auth-btn\" onclick=\"doSignup()\">Sign up В· нҡҢмӣҗк°Җмһ…<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"auth-foot\">көҗмӮ¬ нҡҢмӣҗк°Җмһ… мӢң Teacher к¶Ңн•ңмқҙ мһҗлҸҷ л¶Җм—¬лҗ©лӢҲлӢӨ.<br>Teachers sign up here вҖ” accounts get Teacher access.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n     MODALS\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->\n\n<!-- History Modal -->\n<div class=\"overlay\" id=\"hist-modal\">\n  <div class=\"modal\" style=\"width:600px\">\n    <div class=\"modal-hdr\">\n      <span class=\"modal-title\" id=\"hist-title\">Student History В· н•ҷмғқ нһҲмҠӨнҶ лҰ¬<\u002Fspan>\n      <button class=\"modal-close\" onclick=\"closeModal('hist-modal')\">Г—<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"hist-stats\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;\"><\u002Fdiv>\n    <div id=\"hist-body\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Edit Detention Modal -->\n<div class=\"overlay\" id=\"edit-modal\">\n  <div class=\"modal\">\n    <div class=\"modal-hdr\">\n      <span class=\"modal-title\" id=\"edit-title\">Edit Detention В· мҲҳм •<\u002Fspan>\n      <button class=\"modal-close\" onclick=\"closeModal('edit-modal')\">Г—<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"sec-label\">Student information В· н•ҷмғқ м •ліҙ<\u002Fdiv>\n    <div class=\"grid3\">\n      <div class=\"field\"><label>Grade В· н•ҷл…„<\u002Flabel><select id=\"e-grade\" onchange=\"eUCls()\"><option value=\"\">Select<\u002Foption><option value=\"7\">7<\u002Foption><option value=\"8\"> from; for(var i=0;i<180;i++){ if(send&&d>send) return ''; if(isSD(d)){ var t=false; for(var j=0;j<mrows.length;j++){if(mrows[j].date===d){t=true;break;}} if(!t) return d; } d=dAdd(d,1); } return ''; }\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   NAVIGATION\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nvar curPage = -1;\nfunction go(n, el){\n  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });\n  document.querySelectorAll('.nt').forEach(function(t){ t.classList.remove('on'); });\n  document.getElementById('p'+n).classList.add('on');\n  if(el) el.classList.add('on');\n  curPage = n;\n  if(n===5){ if(role!=='admin'){ return; } bTeachers(); }\n  if(n===6){ if(role!=='admin'){ return; } bStuRoster(); }\n  if(n===2) bStatus();\n  if(n===3){ roJumpToday(); bRoster(); }\n}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   ROLE\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nfunction applyRole(r, name){\n  role = r;\n  document.getElementById('nb-role-pill').textContent = r==='admin'?'рҹ”‘ Admin В· кҙҖлҰ¬мһҗ':'рҹ‘Ө Teacher В· көҗмӮ¬';\n  document.getElementById('nb-user-lbl').textContent = name || (r==='admin'?'Admin':'Teacher');\n  document.getElementById('nb-ava').textContent = (name||'?').charAt(0).toUpperCase();\n  var adm = r==='admin';\n  document.getElementById('cal-admin-content').style.display = adm?'block':'none';\n  document.getElementById('cal-readonly-content').style.display = adm?'none':'block';\n  document.getElementById('cal-admin-btns').style.display = adm?'flex':'none';\n  document.getElementById('nt-teachers').style.display = adm?'flex':'none';\n  document.getElementById('nt-roster').style.display = adm?'flex':'none';\n  if(!adm && (curPage===5||curPage===6)) go(0, document.querySelectorAll('.nt')[0]);\n  if(!adm){ var s=ssrt&&send?'н•ҷмӮ¬ кё°к°„: '+ssrt+' ~ '+send:'н•ҷмӮ¬ кё°к°„мқҙ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.'; document.getElementById('cal-readonly-txt').textContent=s; }\n  bAddedList(); bStatus(); bRoster();\n}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   AUTH\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nvar curUser = null;\nvar ADMIN_ID = 'Admin', ADMIN_PW = 'gpdlqms1!';\nfunction loadUsers(){ try{ return JSON.parse(localStorage.getItem('hmd_users')||'[]'); }catch(e){ return []; } }\nfunction saveUsers(u){ localStorage.setItem('hmd_users', JSON.stringify(u)); }\nfunction authTab(t){\n  document.getElementById('at-login').classList.toggle('on', t==='login');\n  document.getElementById('at-signup').classList.toggle('on', t==='signup');\n  document.getElementById('auth-pane-login').style.display = t==='login'?'block':'none';\n  document.getElementById('auth-pane-signup').style.display = t==='signup'?'block':'none';\n  aErr('login-err',''); aErr('su-err','');\n}\nfunction makeId(f,l){ return (f+l).replace(/\\s+/g,''); }\nfunction aErr(id,msg){ var e=document.getElementById(id); e.textContent=msg; e.style.display=msg?'block':'none'; }\nfunction doSignup(){\n  var f=document.getElementById('su-fn').value.trim(), l=document.getElementById('su-ln').value.trim(), pw=document.getElementById('su-pw').value;\n  if(!f||!l){ aErr('su-err','First nameкіј Last nameмқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”. В· Enter first & last name.'); return; }\n  if(pw.length<4){ aErr('su-err','л№„л°ҖлІҲнҳёлҠ” 4мһҗ мқҙмғҒмқҙм–ҙм•ј н•©лӢҲлӢӨ. В· Password must be at least 4 characters.'); return; }\n  var id = makeId(f,l);\n  if(id.toLowerCase()==='admin'){ aErr('su-err','мӮ¬мҡ©н•  мҲҳ м—ҶлҠ” IDмһ…лӢҲлӢӨ. В· This ID is reserved.'); return; }\n  var us = loadUsers();\n  for(var i=0;i<us.length;i++){ if(us[i].id.toLowerCase()===id.toLowerCase()){ aErr('su-err','мқҙлҜё мЎҙмһ¬н•ҳлҠ” IDмһ…лӢҲлӢӨ: '+id+' В· This ID already exists.'); return; } }\n  us.push({id:id, first:f, last:l, pw:pw}); saveUsers(us);\n  enterApp({id:id, name:f+' '+l, role:'teacher'});\n}\nfunction doLogin(){\n  var id=document.getElementById('l-id').value.trim(), pw=document.getElementById('l-pw').value;\n  if(!id||!pw){ aErr('login-err','IDмҷҖ л№„л°ҖлІҲнҳёлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”. В· Enter ID and password.'); return; }\n  if(id.toLowerCase()===ADMIN_ID.toLowerCase()){\n    if(pw===ADMIN_PW){ enterApp({id:ADMIN_ID, name:'Admin', role:'admin'}); }\n    else aErr('login-err','л№„л°ҖлІҲнҳёк°Җ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ. В· Incorrect password.');\n    return;\n  }\n  var us = loadUsers(), u = null;\n  for(var i=0;i<us.length;i++){ if(us[i].id.toLowerCase()===id.toLowerCase()){ u=us[i]; break; } }\n  if(!u || u.pw!==pw){ aErr('login-err','ID лҳҗлҠ” л№„л°ҖлІҲнҳёк°Җ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ. В· Incorrect ID or password.'); return; }\n  enterApp({id:u.id, name:u.first+' '+u.last, role:'teacher'});\n}\nfunction enterApp(user){\n  curUser = user;\n  localStorage.setItem('hmd_session', JSON.stringify(user));\n  document.getElementById('auth').style.display='none';\n  document.getElementById('shell').style.display='flex';\n  var rb=document.getElementById('f-recby'); if(rb) rb.value=user.name;\n  applyRole(user.role, user.name);\n}\nfunction logout(){ localStorage.removeItem('hmd_session'); location.reload(); }\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв• nt-weight:600\">'+u.id+'<\u002Ftd>'+\n      '<td>'+u.first+' '+u.last+'<\u002Ftd>'+\n      '<td class=\"tc\"><span class=\"pill p-bl\">Teacher В· көҗмӮ¬<\u002Fspan><\u002Ftd>'+\n      '<td class=\"tc\"><button class=\"btn-sm btn-del\" onclick=\"adminDelTeacher(\\''+u.id.replace(/'/g,\"\\\\'\")+'\\')\">Delete В· мӮӯм ң<\u002Fbutton><\u002Ftd>';\n    tb.appendChild(tr);\n  });\n}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   CALENDAR (Page 0)\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nvar curTerm='', termData={};\nfunction termBounds(t){ var y=t.slice(0,4); return t.slice(4)==='SS' ? [y+'-03-01', y+'-07-31'] : [y+'-08-01', (parseInt(y,10)+1)+'-01-31']; }\nfunction snapTerm(){ if(curTerm) termData[curTerm]={ssrt:ssrt, send:send, shols:shols.slice(), addNH:JSON.parse(JSON.stringify(addNH)), remNH:remNH.slice(), extraSD:extraSD.slice()}; }\nfunction loadTerm(t){\n  var d=termData[t];\n  if(d){ ssrt=d.ssrt; send=d.send; shols=d.shols.slice(); addNH=JSON.parse(JSON.stringify(d.addNH)); remNH=d.remNH.slice(); extraSD=(d.extraSD||[]).slice(); }\n  else { var b=termBounds(t); ssrt=b[0]; send=b[1]; shols=[]; addNH={}; remNH=[]; extraSD=[]; }\n  document.getElementById('sem-s').value=ssrt;\n  document.getElementById('sem-e').value=send;\n  uSDL(); rNH(); rSH(); rXS();\n}\nfunction onTermChange(){ snapTerm(); curTerm=document.getElementById('term-sel').value; loadTerm(curTerm); }\nfunction saveCalSetup(){\n  if(ssrt&&send&&ssrt>send){ alert('мӢңмһ‘мқјмқҙ мў…лЈҢмқјліҙлӢӨ лҠҰмҠөлӢҲлӢӨ. В· Start date is after end date.'); return; }\n  snapTerm();\n  localStorage.setItem('hmd_terms', JSON.stringify(termData));\n  alert(curTerm+' н•ҷкё° м„Өм •мқҙ м ҖмһҘлҗҳм—ҲмҠөлӢҲлӢӨ. В· Calendar setup saved for '+curTerm+ nfunction rSH(){\n  var w=document.getElementById('hol-list-wrap');\n  document.getElementById('sh-cnt').textContent=shols.length;\n  if(!shols.length){ w.innerHTML='<span class=\"cal-li-empty\">л“ұлЎқлҗң н•ҷкөҗкіөнңҙмқјмқҙ м—ҶмҠөлӢҲлӢӨ. В· No school holidays yet.<\u002Fspan>'; return; }\n  var h='';\n  shols.slice().sort().forEach(function(ds){ h+='<div class=\"cal-li\"><span>'+fmt(ds)+'<\u002Fspan><button class=\"x\" onclick=\"tSH(\\''+ds+'\\')\">Г—<\u002Fbutton><\u002Fdiv>'; });\n  w.innerHTML=h;\n}\ninitTerms();\nfunction doArchive(){\n  var nm=document.getElementById('arch-name').value.trim(); if(!nm){alert('н•ҷкё° мқҙлҰ„мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.');return;}\n  archives.push({name:nm,date:new Date().toLocaleDateString('ko-KR'),recs:recs.slice(),mrows:mrows.slice(),total:recs.length,stus:(function(){var s={};recs.forEach(function(r){s[r.name]=1;});return Object.keys(s).length;})()});\n  recs=[];mrows=[];nrid=0;actionDone={};stOff=0;roOff=0;suOff=0;stDates=[];suSts=[];rsnData=[];\n  closeModal('arch-modal'); document.getElementById('arch-name').value='';\n  bAll(); rArchList();\n}\nfunction rArchList(){\n  var w=document.getElementById('arch-list'); if(!archives.length){w.innerHTML='';return;}\n  var h='<div class=\"sec-label\" style=\"margin-top:8px\">Past semesters В· м§ҖлӮң н•ҷкё° ('+archives.length+')<\u002Fdiv>';\n  archives.forEach(function(a){\n    h+='<div class=\"archive-card\"><div><div style=\"font-size:13px;font-weight:600\">'+a.name+'<\u002Fdiv><div style=\"font-size:11px;color:var(--t2)\">'+a.date+' м ҖмһҘ В· мҙқ '+a.total+'кұҙ В· '+a.stus+'лӘ…<\u002Fdiv><\u002Fdiv><button class=\"btn-sm\" onclick=\"alert(\\'рҹ“Ӣ '+a.name+' вҖ” мҙқ '+a.total+'кұҙ В· '+a.stus+'лӘ…\\')\">мЎ°нҡҢ<\u002Fbutton><\u002Fdiv>';\n  });\n  w.innerHTML=h;\n}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   PAGE 1: ISSUE FORM\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nfunction clsPick(){\n  var c=document.getElementById('f-class').value, g=CG[c]||'';\n  document.getElementById('f-grade').value=g;\n  document.getElementById('f-grade-lbl').textContent=g?('G'+g):'GвҖ”';\n  if(document.getElementById('nm-dd').style.display==='block') nmInput();\n}\n\n/* в”Җв”Җ Student roster store + typeahead в”Җв”Җ */\nfunction loadStuRoster(){ try{ return JSON.parse(localStorage.getItem('hmd_roster')||'[]'); }catch(e){ return []; } }\nfunction saveStuRoster(r){ localStorage.setItem('hmd_roster', JSON.stringify(r)); }\nfunction hideNmDd(){ document.getElementById('nm-dd').style.display='none'; }\nfunction nmInput(){\n  var q=document.getElementById('f-name').value.trim().toLowerCase();\n  var dd=document.getElementById('nm-dd'), ros=loadStuRoster();\n  if(!ros.length){ dd.innerHTML='<div class=\"nm-dd-none\">лЎңмҠӨн„°к°Җ л№„м–ҙ мһҲмҠөлӢҲлӢӨ вҖ” Student Roster нғӯм—җм„ң м—…лЎңл“ңн•ҳм„ёмҡ”. В· Roster is empty вҖ” upload it in the Student Roster tab.<\u002Fdiv>'; dd.style.display='block'; return; }\n  var cls=document.getElementById('f-class').value;\n  var pool=cls?ros.filter(function(s){ return s.cls===cls; }):ros;\n  var hits=pool.filter(function(s){ return !q || s.name.toLowerCase().indexOf(q)!==-1; });\n  hits.sort(function(a,b){ return a.name.localeCompare(b.name); });\n  if(!hits.length){ dd.innerHTML='<div class=\"nm-dd-none\">'+(cls?cls+' л°ҳм—җ мқјм№ҳн•ҳлҠ” н•ҷмғқмқҙ м—ҶмҠөлӢҲлӢӨ В· No match in '+cls:'мқјм№ҳн•ҳлҠ” н•ҷмғқмқҙ м—ҶмҠөлӢҲлӢӨ В· No match found')+'<\u002Fdiv>'; dd.style.display='block'; return; }\n  dd.innerHTML='';\n  if(!cls){ var tip=document.createElement('div'); tip.className='nm-dd-none'; tip.style.cssText='background:var(--warn-bg);color:var(--warn-c);font-weight:600'; tip.textContent='Tip: ClassлҘј лЁјм Җ м„ нғқн•ҳл©ҙ н•ҙлӢ№ л°ҳ н•ҷмғқл§Ң н‘ңмӢңлҗ©лӢҲлӢӨ В· Select  return; }\n    // legacy: Name, Grade, Class\n    if(p.length>=3 && /^\\d+$/.test(p[1].replace(/^G/i,''))){ rows.push({name:p[0], grade:p[1].replace(/^G/i,''), cls:p.slice(2).join(' ')}); return; }\n    // legacy: Name, Class\n    if(p.length>=2){ var cls=p.slice(1).join(' '); rows.push({name:p[0], cls:cls, grade:CG[cls]||''}); }\n  });\n  return rows;\n}\nfunction rosterPaste(){\n  var t=document.getElementById('ros-paste').value;\n  if(!t.trim()){ rosterMsg('л¶ҷм—¬л„ЈмқҖ лӮҙмҡ©мқҙ м—ҶмҠөлӢҲлӢӨ.'); return; }\n  rosterImport(rosterParseText(t));\n  document.getElementById('ros-paste').value='';\n}\nfunction rosterFile(inp){\n  var f=inp.files&&inp.files[0]; if(!f) return;\n  var rd=new FileReader();\n  rd.onload=function(){ rosterImport(rosterParseText(String(rd.result))); inp.value=''; };\n  rd.readAsText(f);\n}\nfunction rosterAddOne(){\n  var nm=document.getElementById('ros-nm').value.trim(), cls=document.getElementById('ros-cls').value;\n  if(!nm||!cls){ rosterMsg('мқҙлҰ„кіј ClassлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.'); return; }\n  rosterImport([{name:nm, cls:cls, grade:CG[cls]||''}]);\n  document.getElementById('ros-nm').value=''; document.getElementById('ros-cls').value='';\n}\nfunction rosterDel(i){\n  var ros=loadStuRoster(); ros.splice(i,1); saveStuRoster(ros); bStuRoster();\n}\nfunction rosterClear(){\n  if(!confirm('м „мІҙ н•ҷмғқ лӘ…лӢЁмқ„ мӮӯм ңн• к№Ңмҡ”? В· Delete the entire roster?')) return;\n  saveStuRoster([]); bStuRoster(); rosterMsg('');\n}\nvar ROS_CLASSES=['Faith','Grace','Hope','Joy','Mercy','Victory','Peace','Charity','Honor','Honesty','Glory A','Glory B'];\nfunction bStuRoster(){\n  var ros=loadStuRoster(), tb=document.getElementById('ros-body');\n  document.getElementById('ros-cnt').textContent='('+ros.length+')';\n  if(!ros.length){ tb.innerHTML='<tr><td colspan=\"4\" class=\"empty-msg\">л“ұлЎқлҗң н•ҷмғқмқҙ м—ҶмҠөлӢҲлӢӨ В· No students yet<\u002Ftd><\u002Ftr>'; return; }\n  tb.innerHTML='';\n  ros.map(function(s,i){ return {s:s,i:i}; }).sort(function(a, лӢҲлӢӨ В· Changes saved');\n}\nfunction autoMD(){ var d=document.getElementById('f-date').value; if(d) document.getElementById('f-mdate').value=nextSD(d); }\nfunction tCb(cb){ var l=cb.closest('label'); if(cb.checked) l.classList.add('on'); else l.classList.remove('on'); }\nfunction gCkd(prefix){ var r=[]; document.querySelectorAll('#'+(prefix||'f-')+'rg input:checked').forEach(function(c){r.push(c.value);}); return r; }\nfunction sub(more){\n  var g=document.getElementById('f-grade').value, cl=document.getElementById('f-class').value;\n  var nm=document.getElementById('f-name').value.trim(), gb=document.getElementById('f-givenby').value.trim();\n  var di=document.getElementById('f-date').value, per=document.getElementById('f-period').value;\n  var md=document.getElementById('f-mdate').value, rs=gCkd('f-'), det=document.getElementById('f-detail').value;\n  if(!nm||!g||!di||!per){alert('Grade, name, date, periodлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.');return;}\n  if(md && send && md>send){ alert('MD лӮ м§ңк°Җ н•ҷкё° мў…лЈҢмқј мқҙнӣ„мһ…лӢҲлӢӨ. кё°лЎқл§Ң м ҖмһҘлҗҳкі  MD Rosterм—җлҠ” м¶”к°Җлҗҳм§Җ м•ҠмҠөлӢҲлӢӨ.\\nВ· MD date is past semester end вҖ” saved as record only.'); md=''; }\n  if(!md && !confirm('мқҙлІҲ н•ҷкё°м—җ лӮЁмқҖ л“ұкөҗмқјмқҙ м—ҶмҠөлӢҲлӢӨ. кё°лЎқл§Ң м ҖмһҘн•ҳкі  MDлҠ” л°°м •н•ҳм§Җ м•Ҡмқ„к№Ңмҡ”?\\nВ· No school days left this semester вҖ” save as record only (no MD)?')) return;\n  var idx=recs.length;\n  recs.push({name:nm,grade:g,cls:cl,givenBy:gb,recordedBy:document.getElementById('f-recby').value.trim(),date:di,period:per,reasons:rs,detail:det,isAuto:false});\n  if(md) mrows.push({recIdx:idx,date:md,status:'active',rowId:nrid++});\n  bAll(); bAddedList();\n  if(!more){ resetForm(); go(2, document.querySelectorAll('.nt')[3]); }\n  else resetFormKeepDate();\n}\nfunction resetForm(){\n  ['f-name','f-givenby','f-detail'].forEach(function(id){document.getElementById(id).value='';});\n  document.getElementById('f-grade').value=''; document.getElementById('f-class').value=''; document.getElementById('f-grade-lbl').textContent='GвҖ”'; document.getElementById('f-period').value='';\n  document.getElementById('f-recby').value = curUser?curUser.name:'';\n  var t=new Date().toISOString().split('T')[0]; document.getElementById('f-date').value=t; document.getElementById('f-mdate').value=nextSD(t);\n  document.querySelectorAll('#f-rg input').forEach(function(cb){cb.checked=false;cb.closest('label').classList.remove('on');});\n}\nfunction resetFormKeepDate(){\n  ['f-name','f-givenby','f-detail'].forEach(function(id){document.getElementById(id).value='';});\n  document.getElementById('f-grade').value=''; document.getElementById('f-class').value=''; document.getElementById('f-grade-lbl').textContent='GвҖ”'; document.getElementById('f-period').value='';\n  document.querySelectorAll('#f-rg input').forEach(function(cb){cb.checked=false;cb.closest('label').classList.remove('on');});\n}\nfunction bAddedList(){\n  var el=document.getElementById('added-list');\n  var manual=recs.filter(function(r){return !r.isAuto;});\n  if(!manual.length){el.innerHTML='';return;}\n  var h='<div class=\"sec-label\">Added В· л°ңкёүлҗЁ ('+manual.length+')<\u002Fdiv>';\n  manual.forEach(function(r){\n    var i=recs.indexOf(r);\n    h+='<div class=\"rec-chip\"><span><strong>'+r.name+'<\u002Fstrong> <span style=\"color:var(--t3)\">Gr.'+r.grade+' '+r.cls+' В· '+r.date+' В· P'+r.period+'<\u002Fspan><\u002Fspan>';\n    if(role==='admin') h+='<div style=\"display:flex;gap:4px\"><button class=\"btn-sm btn-edit\" onclick=\"openEdit('+i+')\">Edit В· мҲҳм •<\u002Fbutton><button class=\"btn-sm btn-del\" onclick=\"delRec('+i+')\">Del В· мӮӯм ң<\u002Fbutton><\u002Fdiv>';\n    h+='<\u002Fdiv>';\n  });\n  el.innerHTML=h;\n}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   EDIT MODAL\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв• d && send && nd>send){ alert('MD лӮ м§ңк°Җ н•ҷкё° мў…лЈҢмқј мқҙнӣ„мһ…лӢҲлӢӨ. В· MD date is past semester end.'); return; }\n  var mr=mrows.find(function(m){return m.recIdx===editIdx;});\n  if(mr&&nd) mr.date=nd; else if(nd) mrows.push({recIdx:editIdx,date:nd,status:'active',rowId:nrid++});\n  closeModal('edit-modal'); bAll(); bAddedList();\n}\nfunction delRec(idx){\n  if(!confirm('мқҙ кё°лЎқмқ„ мӮӯм ңн• к№Ңмҡ”?')) return;\n  recs.splice(idx,1); mrows=mrows.filter(function(m){return m.recIdx!==idx;});\n  mrows.forEach(function(m){if(m.recIdx>idx)m.recIdx--;}); bAll(); bAddedList();\n}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   SKIP / EXCUSED\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nfunction fRow(id){ for(var i=0;i<mrows.length;i++){if(mrows[i].rowId===id)return i;} return -1; }\nfunction hSkip(id){\n  var i=fRow(id); if(i===-1)return; var row=mrows[i]; if(row.status!=='active')return;\n  row.status='skipped';\n  var sd=row.date, re=nextFree(dAdd(sd,1));\n  var u={};\n  if(re){ var reId=nrid++; mrows.splice(i+1,0,{recIdx:row.recIdx,date:re,status:'active',rowId:reId}); u.reRowId=reId; }\n  var orig=recs[row.recIdx], vi=recs.length;\n  recs.push({name:orig.name,grade:orig.grade,cls:orig.cls,givenBy:'auto',date:sd,period:'ETC',reasons:['MD Skip'],detail:'Auto: MD skip on '+sd,isAuto:true});\n  u.autoRecIdx=vi;\n  var autoMd=re?nextFree(dAdd(re,1)):'';\n  if(autoMd){ var autoRowId=nrid++; mrows.push({recIdx:vi,date:autoMd,status:'active',rowId:autoRowId}); u.autoRowId=autoRowId; }\n  row.undo=u;\n  if(!re||!autoMd) alert('н•ҷкё° лӮҙ лӮЁмқҖ л“ұкөҗмқјмқҙ л¶ҖмЎұн•ҳм—¬ мқјл¶Җ MDлҠ” л°°м •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ (кё°лЎқл§Ң м ҖмһҘ).\\nВ· Not enough school days left this semester вҖ” some MDs saved as record only.');\n  bAll();\n}\nfunction undoSkip(id){\n  var i=fRow(id); if(i===-1)return; var row=mrows[i]; if(row.status!=='skipped')return;\n  if(!confirm('Skipмқ„ м·ЁмҶҢн•ҳкі  мӣҗлһҳ мғҒнғңлЎң лҗҳлҸҢлҰҙк№Ңмҡ”? В· Undo this skip?')) return;\n  var u=row.undo||{};\n  // remove rescheduled row + auto-detention row\n  mrows=mrows.filter(function(m){ return m.rowId!==u.reRowId && m.rowId!==u.autoRowId; });\n  // remove auto MD Skip record (reindex)\n  if(typeof u.autoRecIdx==='number' && recs[u.autoRecIdx] && recs[u.autoRecIdx].isAuto){\n    recs.splice(u.autoRecIdx,1);\n    mrows.forEach(function(m){ if(m.recIdx>u.autoRecIdx) m.recIdx--; });\n  }\n  row.status='active'; delete row.undo;\n  bAll();\n}\nfunction undoExc(id){\n  var i=fRow(id); if(i===-1)return; var row=mrows[i]; if(row.status!=='excused')return;\n  if(!confirm('ExcusedлҘј м·ЁмҶҢн•ҳкі  мӣҗлһҳ мғҒнғңлЎң лҗҳлҸҢлҰҙк№Ңмҡ”? В· Undo?')) return;\n  var u=row.undo||{};\n  mrows=mrows.filter(function(m){ return m.rowId!==u.reRowId; });\n  row.status='active'; delete row.undo;\n  bAll();\n}\nfunction hExc(id){\n  var i=fRow(id); if(i===-1)return; var row=mrows[i]; if(row.status!=='active')return;\n  row.status='excused';\n  var re2=nextFree(dAdd(row.date,1));\n  if(re2){ var reId2=nrid++; mrows.splice(i+1,0,{recIdx:row.recIdx,date:re2,status:'active',rowId:reId2}); row.undo={reRowId:reId2}; }\n  else { row.undo={}; alert('н•ҷкё° лӮҙ лӮЁмқҖ л“ұкөҗмқјмқҙ м—Ҷм–ҙ мһ¬л°°м • м—Ҷмқҙ мІҳлҰ¬лҗҳм—ҲмҠөлӢҲлӢӨ.\\nВ· No school days left this semester вҖ” no reschedule.'); }\n  bAll();\n}\nfunction markAll(){ document.querySelectorAll('#ro-body input[data-att]').forEach(function(cb){cb.checked=true;}); }\nfunction clearFilter(){ document.getElementById('f-date-filter').value=''; bRoster(); }\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   HISTORY MODAL\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nfunction openHist(name){\n  var myRecs=recs.map(function(r,i){return{r:r,i:i};}).filter(function(x){return x.r.name===name;});\n  document.getElementById('hist-title').textContent=name+' вҖ” History В· м „мІҙ кё°лЎқ ('+myRecs.length+'кұҙ)';\n  var total=myRecs.length, ai=getAI(total,name);\n  document.getElementById('hist-stats').innerHTML=\n    '<div class=\"stat-card\"><div><div class=\"stat-val\">'+total+'<\u002Fdiv><div class=\"stat-lbl\">Total В· м „мІҙ кұҙмҲҳ<\u002Fdiv><\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat-card\"><div><div class=\"stat-val\">'+myRecs.filter(function(x){return !x.r.isAuto;}).length+'<\u002Fdiv><div class=\"stat-lbl\">Actual В· мӢӨм ң л°ңкёү<\u002Fdiv><\u002Fdiv><\u002Fdiv>'+\n    '<div class=\"stat-card\"><div><div style=\"margin:4px 0\"><span class=\"ab '+ai.cls+'\">'+ai.lbl+'<\u002Fspan><\u002Fdiv><div class=\"stat-lbl\">Status В· нҳ„мһ¬ мғҒнғң<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n  var h='';\n  myRecs.sort(function(a,b){return a.r.date<b.r.date?-1:1;}).forEach(function(x,seq){\n    var r=x.r, idx=x.i;\n    var bdg=r.reasons.map(function(rs){return '<span class=\"pill '+(rs==='MD Skip'?'p-sk':'p-ac')+'\">'+rs+'<\u002Fspan>';}).join(' ');\n    h+='<div class=\"hist-row\"><div class=\"hist-dot'+(r.isAuto?' auto':'')+'\"><\u002Fdiv><div style=\"flex:1\">'+\n      '<div style=\"font-size:13px;font-weight:600\">#'+(seq+1)+' В· '+r.date+(r.period?' В· P'+r.period:'')+'<\u002Fdiv>'+\n      '<div style=\"font-size:11px;color:var(--t3);margin:2px 0\">'+(r.givenBy||'вҖ”')+(r.recordedBy?' В· Recorded by В· кё°лЎқ: '+r.recordedBy:'')+(r.detail?' В· '+r.detail:'')+'<\u002Fdiv>'+\n      '<div style=\"margin:4px 0\">'+bdg+'<\u002Fdiv>'+\n      (role==='admin'&&!r.isAuto?'<div style=\"display:flex;gap:4px;margin-top:6px\"><button class=\"btn-sm btn-edit\" onclick=\"closeModal(\\'hist-modal\\');openEdit('+idx+')\">Edit В· мҲҳм •<\u002Fbutton><button class=\"btn-sm btn-del\" onclick=\"closeModal(\\'hist-modal\\');delRec('+idx+')\">Delete В· мӮӯм ң<\u002Fbutton><\u002Fdiv>':'')+\n    '<\u002Fdiv><\u002Fdiv>';\n  });\n  document.getElementById('hist-body').innerHTML=h||'<div class=\"empty-msg\">кё°лЎқ м—ҶмқҢ В· No records<\u002Fdiv>';\n  openModal('hist-modal');\n}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   TABLE NAV HELPER\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nfunction setNC(pid,nid,lid,pgid,cid,off,tot,per,lblFn){\n  var ctrl=document.getElementById(cid);\n  if(tot<=per){ctrl.style.display='none';return;}\n  ctrl.style.display='flex';\n  var mx=Math.max(0,tot-per);\n  document.getElementById(pid).disabled=(off<=0); document.getElementById(nid).disabled=(off>=mx);\n  if(lblFn) document.getElementById(lid).textContent=lblFn();\n  document.getElementById(pgid).textContent=(off+1)+'вҖ“'+Math.min(off+per,tot)+' / '+tot;\n}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   PAGE 2: MD STATUS\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nfunction stScroll(d){ stOff+=d*ST_PER; var mx=Math.max(0,stDates.length-ST_PER); if(stOff<0)stOff=0; if(stOff>mx)stOff=mx; rStTbl(); }\nfunction bStatus(){\n  var dates=[]; recs.forEach(function(r){if(dates.indexOf(r.date)===-1)dates.push(r.date);}); dates.sort();\n  stDates=dates; stOff=Math.max(0,dates.length-ST_PER);\n  if(!dates.length){ document.getElementById('st-tbl').style.display='none'; document.getElementById('st-empty').style.display='block'; document.getElementById('st-ctrl').style.display='none'; return; }\n  document.getElementById('st-empty').style.display='none';\n  setNC('st-prev','st-next','st-lbl','st-pg','st-ctrl',stOff,dates.length,ST_PER,function(){return stDates.slice(stOff,stOff+ST_PER).map(function(d){return new Date(d+'T12:00:00').toLocaleDateString('ko-KR',{month:'short',day:'numeric'});}).join(' / ');});\n  rStTbl();\n}\nfunction rStTbl(){\n  var P=['1','2','3','4','5','6','HR','ETC'], vis=stDates.slice(stOff,stOff+ST_PER);\n  setNC('st-prev','st-next','st-lbl','st-pg','st-ctrl',stOff,stDates.length,ST_PER,function(){return vis.map(function(d){return new Date(d+'T12:00:00').toLocaleDateString('ko-KR',{month:'short',day:'numeric'});}).join(' / ');});\n  document.getElementById('st-tbl').style.display='table';\n  var dr=document.getElementById('st-dr'), pr=document.getElementById('st-pr');\n  dr.innerHTML='<th style=\"min-width:96px\" rowspan=\"2\">Student<span class=\"th-ko\">н•ҷмғқ<\u002Fspan><\u002Fth><th style=\"min-width:44px;text-align:center\" rowspan=\"2\">Total<span class=\"th-ko\">н•ҷкё° лҲ„м Ғ<\u002Fspan><\u002Fth>'; pr.innerHTML='';\n  vis.forEach(function(d){ var lbl=new Date(d+'T12:00:00').toLocaleDateString('ko-KR',{month:'short',day:'numeric'}); var th=document.createElement('th'); th.colSpan=P.length; th.textContent=lbl; th.style.cssText='background:var(--bll);color:var(--bl);text-align:center'; dr.appendChild(th); P.forEach(function(p){var ph=document.createElement('th');ph.textContent=p;ph.className='tc';ph.style.minWidth='23px';pr.appendChild(ph);}); });\n  var keys=[]; recs.forEach(function(r){var k=r.name+'|'+r.grade+'|'+r.cls; if(keys.indexOf(k)===-1)keys.push(k);});\n  var tb=document.getElementById('st-body'); tb.innerHTML='';\n  keys.forEach(function(key){\n    var pts=key.split('|'), tr=document.createElement('tr');\n    var ntd=document.createElement('td');\n    ntd.innerHTML='<span class=\"name-link\" onclick=\"openHist(\\''+pts[0]+'\\')\">'+pts[0]+'<\u002Fspan><br><span style=\"font-size:10px;color:var(--t3)\">G'+pts[1]+' '+pts[2]+'<\u002Fspan>';\n    tr.appendChild(ntd);\n    var tot=recs.filter(function(r){return r.name===pts[0];}).length;\n    var ttd=document.createElement('td'); ttd.className='tc';\n    ttd.innerHTML='<span class=\"'+getCCls(tot)+'\">'+tot+'<\u002Fspan>';\n    tr.appendChild(ttd);\n    vis.forEach(function(d){ var rs=recs.filter(function(r){return r.name===pts[0]&&r.date===d;}); P.forEach(function(p){ var td=document.createElement('td');td.className='tc'; rs.filter(function(r){return r.period===p;}).forEach(function(rec){ var tip=rec.reasons.join(', ')||p, sp=document.createElement('span'); if(rec.isAuto){sp.className='mark mk-sk';}else if(p==='HR'){sp.className='mark mk-hr';}else if(p==='ETC'){sp.className='mark mk-etc';}else{sp.className='mark mk-p';} sp.innerHTML=(p==='HR'?'HR':(p==='ETC'?'E':(rec.isAuto?'S':p)))+'<span class=\"tip\">'+tip+'<\u002Fspan>'; td.appendChild(sp); }); tr.appendChild(td); }); });\n    tb.appendChild(tr);\n  });\n}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   PAGE 3: MD ROSTER\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nfunction roScroll(d){ roOff+=d*RO_PER; bRoster(); }\nfunction roJumpToday(){\n  var t=new Date().toISOString().split('T')[0];\n  var sorted=mrows.slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:a.rowId-b.rowId;});\n  var idx=-1;\n  for(var i=0;i<sorted.length;i++){ if(sorted[i].date>=t){ idx=i; break; } }\n  roOff = idx<0 ? Math.max(0,sorted.length-RO_PER) : idx;\n}\nfunction bRoster(){\n  var fd=document.getElementById('f-date-filter').value;\n  var sorted=mrows.slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:a.rowId-b.rowId;});\n  var filtered=fd?sorted.filter(function(r){return r.date===fd;}):sorted;\n  document.getElementById('fcnt').textContent=fd?'('+filtered.length+'лӘ…)':'(м „мІҙ '+filtered.length+'лӘ…)';\n  var mx=Math.max(0,filtered.length-RO_PER); if(roOff<0)roOff=0; if(roOff>mx)roOff=mx;\n  setNC('ro-prev','ro-next','ro-lbl','ro-pg','ro-ctrl',roOff,filtered.length,RO_PER,function(){ var sl=filtered.slice(roOff,roOff+RO_PER); return sl.length?fmt(sl[0].date)+' ~ '+fmt(sl[sl.length-1].date):''; });\n  // update badge\n  var activeTot=mrows.filter(function(r){return r.status==='active';}).length;\n  var badge=document.getElementById('nb-badge'); badge.textContent=activeTot; badge.style.display=activeTot>0?'inline':'none';\n  var page=filtered.slice(roOff,roOff+RO_PER);\n  var tb=document.getElementById('ro-body'); tb.innerHTML='';\n  if(!filtered.length){ tb.innerHTML='<tr><td colspan=\"9\" class=\"empty-msg\">'+(fd?'No students on this date В· н•ҙлӢ№ лӮ м§ңм—җ л“ұлЎқлҗң н•ҷмғқмқҙ м—ҶмҠөлӢҲлӢӨ':'No records yet В· кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ')+'<\u002Ftd><\u002Ftr>'; return; }\n  page.forEach(function(row){\n    var r=recs[row.recIdx], done=row.status!=='active', auto=r.isAuto;\n    var bdg=r.reasons.map(function(x){return '<span class=\"pill '+(x==='MD Skip'?'p-sk':'p-ac')+'\">'+x+'<\u002Fspan>';}).join(' ');\n    var tr=document.createElement('tr'); tr.className=row.status==='skipped'?'row-sk':row.status==='excused'?'row-ex':'hover-row';\n    var dh='<span'+(done?' style=\"text-decoration:line-through;opacity:.55\"':'')+'>'+fmt(row.date)+'<\u002Fspan>';\n    if(row.status==='skipped') dh+=' <span class=\"badge-sk\">Skipped В· мҠӨнӮө<\u002Fspan>';\n    if(row.status==='excused') dh+=' <span class=\"badge-ex\">Excused В· мқём •<\u002Fspan>';\n    var ah=row.status==='skipped'?'<button class=\"btn-sm\" onclick=\"undoSkip('+row.rowId+')\">вҶ© Undo В· лҗҳлҸҢлҰ¬кё°<\u002Fbutton>':row.status==='excused'?'<button class=\"btn-sm\" onclick=\"undoExc('+row.rowId+')\">вҶ© Undo В· лҗҳлҸҢлҰ¬кё°<\u002Fbutton>':done?'вҖ”':'<div style=\"display:flex;gap:4px;justify-content:center\"><button class=\"btn-sm btn-skip\" onclick=\"hSkip('+row.rowId+')\">Skip<\u002Fbutton><button class=\"btn-sm btn-exc\" onclick=\"hExc('+row.rowId+')\">Excused<\u002Fbutton><\u002Fdiv>';\n    tr.innerHTML='<td style=\"white-space:nowrap\">'+dh+'<\u002Ftd>'+\n      '<td><span class=\"name-link\" onclick=\"openHist(\\''+r.name+'\\')\">'+r.name+'<\u002Fspan>'+(auto?' <span class=\"auto-tag\">(auto)<\u002Fspan>':'')+'<\u002Ftd>'+\n      '<td style=\"font-size:11px;color:var(--t2)\">G'+r.grade+' '+r.cls+'<\u002Ftd>'+\n      '<td>'+bdg+'<\u002Ftd>'+\n      '<td style=\"font-size:11px\">'+(auto?'<span class=\"auto-tag\">auto<\u002Fspan>':(r.givenBy||'вҖ”'))+'<\u002Ftd>'+\n      '<td class=\"tc\">'+(done?'вҖ”':'<input type=\"checkbox\" data-att=\"1\" style=\"width:14px;height:14px;accent-color:var(--gr)\">')+'<\u002Ftd>'+\n      '<td class=\"tc\">'+(done?'вҖ”':'<input type=\"checkbox\" style=\"width:14px;height:14px;accent-color:var(--gr)\">')+'<\u002Ftd>'+\n      '<td class=\"tc\">'+ah+'<\u002Ftd>'+\n      '<td>'+(done?'вҖ”':'<input type=\"text\" placeholder=\"Name В· мқҙлҰ„\" style=\"font-size:11px;height:26px\">')+'<\u002Ftd>';\n    tb.appendChild(tr);\n  });\n}\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   PAGE 4: SUMMARY\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nfunction getAI(c, key){\n  var done=actionDone[key];\n  if(c===15) return{lbl:'Self-Reflection В· л§ҲмқҢлҸҢлҙ„',cls:done?'ab-done':'ab-c',needsAction:true};\n  if(c===10||c===5) return{lbl:'Apology letter В· л°ҳм„ұл¬ё',cls:done?'ab-done':'ab-w',needsAction:true};\n  return{lbl:'MD only В· н•ҙлӢ№ м—ҶмқҢ',cls:'ab-n',needsAction:false};\n}\nfunction getCCls(c){ if(c>=15) return'cb2 c-15'; if(c>=10) return'cb2 c-10'; if(c>=5) return'cb2 c-5'; return'cb2 c-n'; }\nfunction bPips(n){ var h='<div class=\"mpb\">'; for(var i=1;i<=15;i++){ if(i===5||i===10||i===15) h+='<div class=\"msep\"><\u002Fdiv>'; var c='mp'; if(i<=n){if(i>=15)c+=' c';else if(i>=10)c+=' a';else c+=' w';} h+='<div class=\"'+c+'\"><\u002Fdiv>'; } return h+'<\u002Fdiv>'; }\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   TABS / MODALS / UTILS\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\nfunction swTab(e,t){ document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('on');}); document.querySelectorAll('.tp').forEach(function(p){p.classList.remove('on');}); e.target.classList.add('on'); document.getElementById(t).classList.add('on'); }\nfunction openModal(id){ document.getElementById(id).classList.add('open'); }\nfunction closeModal(id){ document.getElementById(id).classList.remove('open'); }\ndocument.querySelectorAll('.overlay').forEach(function(o){ o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('open');}); });\nfunction bAll(){ if(curPage===2||curPage===-1) bStatus(); if(curPage===3||curPage===-1) bRoster(); bAddedList(); }\n\n/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n   INIT\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */\n(function(){\n  var t=new Date().toISOString().split('T')[0];\n  document.getElementById('f-
